<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Элитный каталог пеларгоний</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-[#FAF9F5]" x-data="catalogApp()">
    
    <!-- Шапка и Фильтры -->
    <header class="max-w-[1800px] mx-auto p-6">
        <h1 class="text-4xl font-serif text-[#1C352D] mb-6">Цветочная Галерея</h1>
        <div class="flex flex-wrap gap-4 bg-white p-4 rounded-2xl shadow-sm">
            <template x-for="group in groups" :key="group">
                <button @click="activeGroup = group" 
                        class="px-4 py-2 rounded-full text-sm"
                        :class="activeGroup === group ? 'bg-[#1C352D] text-white' : 'bg-gray-100'">
                    <span x-text="group.toUpperCase()"></span>
                </button>
            </template>
            <label class="flex items-center gap-2">
                <input type="checkbox" x-model="onlyInStock"> Только в наличии
            </label>
        </div>
    </header>

    <!-- Сетка карточек -->
    <main class="max-w-[1800px] mx-auto p-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
        <template x-for="plant in filteredPlants()" :key="plant.id">
            <div class="bg-white rounded-3xl p-4 shadow-sm border border-gray-100 flex flex-col plant-card">
                <div class="pswp-gallery" :id="'gallery-' + plant.id">
                    <a :href="plant.media[0]" target="_blank" data-pswp-width="1000" data-pswp-height="1000">
                        <img :src="plant.media[0]" loading="lazy" class="w-full h-64 object-contain rounded-2xl">
                    </a>
                </div>
                <h3 class="font-bold mt-4" x-text="plant.title"></h3>
                <p class="text-lg font-semibold" x-text="plant.price + ' ₽'"></p>
                <button @click="toggleSelection(plant)" 
                        class="mt-4 py-2 rounded-xl border border-[#1C352D]"
                        :class="isSelected(plant) ? 'bg-[#1C352D] text-white' : ''"
                        x-text="isSelected(plant) ? 'Выбрано' : 'Выбрать'"></button>
            </div>
        </template>
    </main>

    <!-- Кнопка Авито -->
    <div x-show="selectionList.length > 0" class="fixed bottom-8 right-8">
        <button @click="copyForAvito()" class="bg-[#B48B5C] text-white px-8 py-4 rounded-full shadow-2xl font-bold">
            Список для Авито (<span x-text="selectionList.length"></span>)
        </button>
    </div>

    <script src="js/catalog.js" type="module"></script>
</body>
</html>
