<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой питомник пеларгоний</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe.min.css">
</head>
<body class="bg-[#FAF9F5] font-sans">
    <div x-data="catalogApp()" x-init="init()" class="max-w-[1800px] mx-auto p-4">
        <!-- Сетка карточек -->
        <div id="gallery" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            <template x-for="plant in plants" :key="plant.id">
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 p-3">
                    <a :href="plant.media[0]" data-pswp-width="800" data-pswp-height="1000" target="_blank">
                        <img :src="plant.media[0]" loading="lazy" class="w-full h-64 object-contain bg-gray-50 rounded-lg">
                    </a>
                    <div class="mt-3">
                        <h3 class="font-bold text-sm" x-text="plant.title"></h3>
                        <p class="text-md font-semibold text-green-800" x-text="plant.price + ' ₽'"></p>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script type="module">
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe-lightbox.esm.min.js';
        const lightbox = new PhotoSwipeLightbox({
            gallery: '#gallery',
            children: 'a',
            pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe.esm.min.js')
        });
        lightbox.init();
    </script>
    <script src="js/catalog.js"></script>
</body>
</html>
