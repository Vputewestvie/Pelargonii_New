<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторская коллекция пеларгоний</title>
    <!-- Шрифты и стили -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PhotoSwipe (Надежное подключение) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/umd/photoswipe.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/umd/photoswipe-lightbox.umd.min.js"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { botanical: { deep: '#1C352D', sage: '#5B7065', cream: '#FAF9F5', gold: '#B48B5C' } },
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FAF9F5; color: #1C352D; font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="catalogApp()" x-init="init()">

    <!-- ШАПКА САЙТА -->
    <header class="border-b border-botanical-sage/20 py-8 px-4 bg-white/50 backdrop-blur-md sticky top-0 z-30">
        <div class="max-w-[1600px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <span class="text-xs uppercase tracking-[0.2em] text-botanical-gold font-semibold">Авторская Коллекция</span>
                <h1 class="font-serif text-3xl md:text-4xl text-botanical-deep font-semibold mt-1">Цветочная Галерея</h1>
            </div>
            <div class="text-center md:text-right text-xs text-botanical-sage max-w-xs">
                Выберите понравившиеся сорта и просто напишите мне их названия в диалоге на Авито.
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-4 py-8">
        <!-- ФИЛЬТРЫ И ПОИСК -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-botanical-sage/10 mb-8">
            <div class="flex flex-col lg:flex-row gap-6 justify-between items-center">
                <div class="flex flex-wrap gap-2">
                    <template x-for="group in groups" :key="group">
                        <button @click="activeGroup = group"
                                :class="activeGroup === group ? 'bg-botanical-deep text-white' : 'bg-botanical-cream text-botanical-deep hover:bg-botanical-sage/10'"
                                class="px-5 py-2.5 rounded-full text-sm font-medium transition duration-300"
                                x-text="group === 'all' ? 'Все сорта' : capitalize(group)"></button>
                    </template>
                </div>
                <div class="flex flex-col sm:flex-row gap-4 items-center w-full lg:w-auto">
                    <input type="text" x-model="searchQuery" placeholder="Поиск сорта..." class="w-full sm:w-64 bg-botanical-cream rounded-full px-5 py-2.5 text-sm border border-botanical-sage/20 focus:outline-none focus:border-botanical-gold">
                    <label class="flex items-center gap-2 cursor-pointer whitespace-nowrap">
                        <input type="checkbox" x-model="onlyInStock" class="rounded text-botanical-deep focus:ring-botanical-gold w-5 h-5">
                        <span class="text-sm font-medium text-botanical-deep">Только в наличии</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- СЕТКА КАРТОЧЕК -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 pb-24">
            <template x-for="plant in filteredPlants()" :key="plant.id">
                <div class="bg-white rounded-3xl border border-botanical-sage/10 shadow-sm overflow-hidden flex flex-col hover:shadow-xl transition duration-300">
                    
                    <div class="relative aspect-[4/3] bg-botanical-cream overflow-hidden cursor-pointer" @click="openModal(plant)">
                        <img :src="plant.media[0]" class="w-full h-full object-contain hover:scale-105 transition duration-500">
                        <div class="absolute top-3 left-3 bg-white/95 backdrop-blur-sm px-3 py-1 rounded-full text-[10px] uppercase font-semibold text-botanical-gold shadow-sm" x-text="plant.group"></div>
                        <div class="absolute top-3 right-3 shadow-sm">
                            <span :class="plant.stock > 0 ? 'bg-emerald-500/90 text-white' : 'bg-rose-500/90 text-white'" class="px-3 py-1 rounded-full text-[10px] uppercase font-bold" x-text="plant.stock > 0 ? 'В наличии' : 'Ожидается'"></span>
                        </div>
                    </div>

                    <div class="p-6 flex flex-col flex-grow">
                        <h3 class="font-serif text-xl font-bold leading-tight text-botanical-deep cursor-pointer" @click="openModal(plant)">
                            <span x-text="plant.title"></span>
                        </h3>
                        
                        <div class="flex gap-4 my-4 text-xs text-botanical-sage border-y border-botanical-sage/5 py-3">
                            <span x-show="plant.flowerSize">🌸 <span class="font-semibold text-botanical-deep" x-text="plant.flowerSize"></span></span>
                            <span x-show="plant.inflorescenceSize">💮 <span class="font-semibold text-botanical-deep" x-text="plant.inflorescenceSize"></span></span>
                        </div>

                        <div class="mt-auto pt-2 flex justify-between items-center gap-2">
                            <span class="text-2xl font-bold text-botanical-deep" x-text="plant.price + ' ₽'"></span>
                            <div class="flex gap-2">
                                <button @click="toggleComparison(plant)" :class="isInComparison(plant) ? 'bg-botanical-gold text-white' : 'bg-botanical-cream text-botanical-deep hover:bg-botanical-sage/10'" class="p-2.5 rounded-xl text-sm transition" title="Сравнить">⚖️</button>
                                <button @click="toggleSelection(plant)" :class="isSelected(plant) ? 'bg-botanical-deep text-white' : 'border-2 border-botanical-deep text-botanical-deep hover:bg-botanical-cream'" class="px-4 py-2 rounded-xl text-sm font-semibold transition" x-text="isSelected(plant) ? 'В корзине' : 'Выбрать'"></button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- ПОДРОБНОЕ ОКНО СОРТА (С ФОТОГАЛЕРЕЕЙ) -->
    <div x-show="modalOpen" class="fixed inset-0 z-50 overflow-y-auto" style="display: none;" x-transition>
        <div class="flex items-center justify-center min-h-screen px-4 py-6">
            <div class="fixed inset-0 bg-black/70 backdrop-blur-sm" @click="closeModal()"></div>

            <div class="bg-white rounded-3xl max-w-5xl w-full mx-auto relative z-10 overflow-hidden shadow-2xl flex flex-col md:flex-row">
                <button @click="closeModal()" class="absolute top-4 right-4 bg-white/90 hover:bg-gray-100 p-2.5 rounded-full shadow-md z-20 text-botanical-deep font-bold">✕</button>

                <!-- Левая часть: Галерея (ТЕПЕРЬ БЕЗ ССЫЛОК) -->
                <div class="md:w-1/2 bg-botanical-cream p-6 flex flex-col justify-center border-r border-gray-100">
                    <div class="relative aspect-square bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 cursor-zoom-in" @click="openZoom(activePhotoIndex)">
                        <template x-for="(photo, index) in currentPlant.media" :key="index">
                            <img :src="photo" x-show="activePhotoIndex === index" class="w-full h-full object-contain">
                        </template>
                        <div class="absolute bottom-2 left-0 right-0 text-center pointer-events-none">
                            <span class="bg-black/50 text-white text-xs px-3 py-1 rounded-full backdrop-blur-md">Нажмите для увеличения</span>
                        </div>
                    </div>
                    
                    <!-- Миниатюры в окне -->
                    <div class="flex gap-2 mt-4 overflow-x-auto hide-scrollbar pb-2" x-show="currentPlant.media && currentPlant.media.length > 1">
                        <template x-for="(photo, index) in currentPlant.media" :key="index">
                            <img :src="photo" @click="activePhotoIndex = index" class="w-16 h-16 object-cover rounded-lg cursor-pointer border-2 transition" :class="activePhotoIndex === index ? 'border-botanical-gold' : 'border-transparent opacity-60'">
                        </template>
                    </div>
                </div>

                <!-- Правая часть: Текст -->
                <div class="md:w-1/2 p-8 lg:p-10 flex flex-col h-full max-h-[85vh] overflow-y-auto">
                    <span class="text-xs uppercase tracking-wider text-botanical-gold font-semibold" x-text="capitalize(currentPlant.group || '')"></span>
                    <h2 class="font-serif text-3xl font-bold text-botanical-deep mt-2 leading-tight" x-text="(currentPlant.number ? '№' + currentPlant.number + ' ' : '') + currentPlant.title"></h2>
                    <p class="text-sm text-botanical-sage italic mt-1" x-text="currentPlant.latinTitle"></p>

                    <div class="mt-6 space-y-3">
                        <template x-for="bullet in parseBullets(currentPlant.description)" :key="bullet">
                            <div class="flex items-start gap-3 text-sm text-botanical-deep">
                                <span class="text-botanical-gold text-lg leading-none mt-0.5">•</span>
                                <span x-text="bullet"></span>
                            </div>
                        </template>
                    </div>

                    <div class="mt-8 bg-botanical-cream p-5 rounded-2xl border border-botanical-sage/10">
                        <h4 class="text-xs uppercase tracking-wider font-bold text-botanical-gold mb-4">🌿 Памятка по уходу</h4>
                        <div class="text-sm space-y-3 text-botanical-deep">
                            <div x-show="getCare(currentPlant.group).light"><span class="font-semibold block text-botanical-sage text-xs">ОСВЕЩЕНИЕ</span> <span x-text="getCare(currentPlant.group).light"></span></div>
                            <div x-show="getCare(currentPlant.group).water"><span class="font-semibold block text-botanical-sage text-xs mt-2">ПОЛИВ</span> <span x-text="getCare(currentPlant.group).water"></span></div>
                        </div>
                    </div>

                    <div class="mt-10 pt-6 border-t border-botanical-sage/10 flex justify-between items-center gap-4">
                        <span class="text-3xl font-bold text-botanical-deep" x-text="currentPlant.price + ' ₽'"></span>
                        <button @click="toggleSelection(currentPlant)" :class="isSelected(currentPlant) ? 'bg-botanical-gold text-white' : 'bg-botanical-deep text-white'" class="px-8 py-4 rounded-xl font-bold transition shadow-lg hover:shadow-xl hover:-translate-y-1" x-text="isSelected(currentPlant) ? 'В списке' : 'Выбрать'"></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ТАБЛИЦА СРАВНЕНИЯ -->
    <div x-show="comparisonList.length > 0" class="fixed bottom-28 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-md rounded-2xl shadow-xl border border-botanical-gold/30 px-6 py-4 flex items-center gap-6 z-40" style="display: none;" x-transition>
        <span class="text-sm font-bold text-botanical-deep flex items-center gap-2">⚖️ К сравнению: <span x-text="comparisonList.length"></span></span>
        <button @click="comparisonOpen = true" class="bg-botanical-gold text-white px-5 py-2.5 rounded-xl text-xs font-bold transition">Сравнить</button>
        <button @click="comparisonList = []" class="text-xs text-gray-400 hover:text-red-500 font-bold uppercase tracking-wider">Очистить</button>
    </div>

    <div x-show="comparisonOpen" class="fixed inset-0 z-50 overflow-y-auto" style="display: none;" x-transition>
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="fixed inset-0 bg-black/70 backdrop-blur-sm" @click="comparisonOpen = false"></div>
            <div class="bg-white rounded-3xl p-8 max-w-5xl w-full relative z-10 overflow-x-auto shadow-2xl">
                <button @click="comparisonOpen = false" class="absolute top-5 right-5 bg-gray-100 p-2 rounded-full font-bold">✕</button>
                <h3 class="font-serif text-3xl font-bold mb-8 text-botanical-deep">Сравнение сортов</h3>
                <table class="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                        <tr class="border-b-2 border-gray-100">
                            <th class="py-4 font-bold text-gray-400 text-xs uppercase w-1/4">Параметр</th>
                            <template x-for="item in comparisonList" :key="item.id">
                                <th class="py-4 px-4 font-serif text-xl text-botanical-deep font-bold" x-text="item.title"></th>
                            </template>
                        </tr>
                    </thead>
                    <tbody class="text-sm text-botanical-deep">
                        <tr class="border-b border-gray-100">
                            <td class="py-4 font-bold text-gray-400 text-xs uppercase">Фото</td>
                            <template x-for="item in comparisonList" :key="item.id">
                                <td class="py-4 px-4"><img :src="item.media[0]" class="w-32 h-32 object-cover rounded-2xl shadow-sm"></td>
                            </template>
                        </tr>
                        <tr class="border-b border-gray-100">
                            <td class="py-4 font-bold text-gray-400 text-xs uppercase">Группа</td>
                            <template x-for="item in comparisonList" :key="item.id">
                                <td class="py-4 px-4 font-bold text-botanical-gold uppercase tracking-wider" x-text="item.group"></td>
                            </template>
                        </tr>
                        <tr class="border-b border-gray-100">
                            <td class="py-4 font-bold text-gray-400 text-xs uppercase">Размер цветка</td>
                            <template x-for="item in comparisonList" :key="item.id">
                                <td class="py-4 px-4 font-semibold" x-text="item.flowerSize || '—'"></td>
                            </template>
                        </tr>
                        <tr class="border-b border-gray-100">
                            <td class="py-4 font-bold text-gray-400 text-xs uppercase">Цена</td>
                            <template x-for="item in comparisonList" :key="item.id">
                                <td class="py-4 px-4 font-bold text-xl" x-text="item.price + ' ₽'"></td>
                            </template>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- КОРЗИНА АВИТО -->
    <div x-show="selectionList.length > 0" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-botanical-deep text-white rounded-full shadow-2xl px-8 py-4 flex items-center gap-8 z-40 max-w-lg w-11/12" style="display: none;" x-transition>
        <div class="text-left flex-1">
            <span class="text-xs uppercase tracking-wider block opacity-75">Выбрано сортов: <span x-text="selectionList.length"></span></span>
            <span class="text-lg font-bold" x-text="calculateTotal() + ' ₽'"></span>
        </div>
        <button @click="copyForAvito()" class="bg-botanical-gold text-white hover:bg-opacity-90 px-6 py-3 rounded-full text-xs font-bold tracking-wider uppercase transition shadow-lg hover:-translate-y-0.5">В Авито</button>
    </div>

    <!-- СКРИПТ -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('catalogApp', () => ({
                plants: [], groups: ['all'], activeGroup: 'all', searchQuery: '', 
                onlyInStock: false, selectionList: [], comparisonList: [],
                modalOpen: false, currentPlant: { media: [], title: '', group: '' }, 
                activePhotoIndex: 0, comparisonOpen: false,
                
                async init() {
                    try {
                        const id = '1tr_vl_q8yh4grAmJkaD7QvmueQQvbJGojm7C_otpyd4';
                        const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
                        const text = await res.text();
                        
                        const startIdx = text.indexOf('{');
                        const endIdx = text.lastIndexOf('}');
                        if (startIdx === -1) return;
                        
                        const json = JSON.parse(text.substring(startIdx, endIdx + 1));
                        
                        this.plants = json.table.rows.map((row, i) => {
                            const c = (idx) => {
                                if (!row || !row.c || !row.c[idx] || row.c[idx].v === null || row.c[idx].v === undefined) return '';
                                return String(row.c[idx].v).trim();
                            };

                            const title = c(1);
                            if (!title) return null;

                            const mediaList = [];
                            const colM = c(12);
                            const colN = c(13);
                            
                            if (colM) mediaList.push(...colM.split('|').map(s=>s.trim()).filter(s=>s));
                            if (colN) mediaList.push(...colN.split('|').map(s=>s.trim()).filter(s=>s));
                            if (mediaList.length === 0) mediaList.push('https://via.placeholder.com/600?text=Нет+фото');

                            return {
                                id: i, number: c(0), title: title, stock: Number(c(2)) || 0,
                                latinTitle: c(3), group: String(c(4) || 'all').toLowerCase(),
                                flowerSize: c(6), inflorescenceSize: c(7), price: Number(c(8)) || 0,
                                description: c(9), color: c(5), media: mediaList
                            };
                        }).filter(p => p !== null);

                        this.groups = ['all', ...new Set(this.plants.map(p => p.group))];
                    } catch (e) { 
                        console.error("Ошибка загрузки:", e); 
                    }
                },

                // УМНЫЙ ЗАПУСК ЗУМА БЕЗ ССЫЛОК
                openZoom(idx) {
                    if (!this.currentPlant.media || this.currentPlant.media.length === 0) return;
                    
                    const lightbox = new PhotoSwipeLightbox({
                        dataSource: this.currentPlant.media.map(url => ({
                            src: url,
                            width: 1200, // PhotoSwipe сам аккуратно ужмет до размеров экрана
                            height: 1600
                        })),
                        pswpModule: PhotoSwipe
                    });
                    
                    lightbox.init();
                    lightbox.loadAndOpen(idx);
                },

                filteredPlants() {
                    return this.plants.filter(p => {
                        const mGroup = this.activeGroup === 'all' || p.group === this.activeGroup;
                        const mStock = !this.onlyInStock || p.stock > 0;
                        const mSearch = String(p.title).toLowerCase().includes(this.searchQuery.toLowerCase());
                        return mGroup && mStock && mSearch;
                    });
                },

                openModal(plant) {
                    this.currentPlant = plant;
                    this.activePhotoIndex = 0;
                    this.modalOpen = true;
                },
                closeModal() { this.modalOpen = false; },
                capitalize(str) { return str ? String(str).charAt(0).toUpperCase() + String(str).slice(1) : ''; },
                parseBullets(desc) { return desc ? String(desc).split('•').map(b => b.trim()).filter(b => b) : []; },
                
                toggleSelection(p) { 
                    const idx = this.selectionList.findIndex(item => item.id === p.id);
                    idx > -1 ? this.selectionList.splice(idx, 1) : this.selectionList.push(p);
                },
                isSelected(p) { return this.selectionList.some(item => item.id === p.id); },
                calculateTotal() { return this.selectionList.reduce((sum, p) => sum + p.price, 0); },
                
                toggleComparison(p) {
                    const idx = this.comparisonList.findIndex(item => item.id === p.id);
                    if (idx > -1) { this.comparisonList.splice(idx, 1); } 
                    else {
                        if (this.comparisonList.length >= 3) return alert("Не более 3 сортов");
                        this.comparisonList.push(p);
                    }
                },
                isInComparison(p) { return this.comparisonList.some(item => item.id === p.id); },

                copyForAvito() {
                    let text = "Здравствуйте! Хочу приобрести:\n\n";
                    this.selectionList.forEach(p => text += `• ${p.title} (${p.price} ₽)\n`);
                    text += `\nИтого: ${this.calculateTotal()} ₽.`;
                    navigator.clipboard.writeText(text).then(() => alert('Список скопирован!'));
                },

                getCare(group) {
                    const g = String(group || '').toLowerCase();
                    if (g.includes('розебуд')) return { light: "Яркий свет. Избегать прямых лучей.", water: "Умеренный, после просыхания." };
                    if (g.includes('тюльпан')) return { light: "Рассеянный свет, боятся ожогов.", water: "Очень умеренный, без застоя." };
                    return { light: "Яркий рассеянный свет.", water: "По мере просыхания земли." };
                }
            }));
        });
    </script>
</body>
</html>
